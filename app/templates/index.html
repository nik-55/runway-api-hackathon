{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2 style="margin-top: 0;">New reel</h2>
  <form method="post" action="/sessions">
    <div class="row" style="margin-bottom: 8px;">
      <input name="youtube_url" placeholder="https://www.youtube.com/watch?v=..." required style="flex: 1; min-width: 280px;">
    </div>
    <div class="row" style="margin-bottom: 8px;">
      <input name="direction" placeholder="Optional direction — &quot;roast it&quot;, &quot;explain why this matters&quot;..." style="flex: 1; min-width: 280px;">
    </div>
    <button type="submit">Generate</button>
  </form>
</section>

<section class="panel">
  <h2 style="margin-top: 0;">Sessions</h2>
  {% if sessions %}
  <table>
    <thead>
      <tr><th>Status</th><th>URL</th><th>Direction</th><th>Created</th><th></th></tr>
    </thead>
    <tbody>
      {% for s in sessions %}
      <tr>
        <td><span class="badge {{ s.status }}">{{ s.status }}</span></td>
        <td style="max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"><a href="{{ s.youtube_url }}" title="{{ s.youtube_url }}">{{ s.youtube_url }}</a></td>
        <td class="dim">{{ s.direction or "—" }}</td>
        <td class="dim">{{ s.created_at }}</td>
        <td><a href="/sessions/{{ s.id }}">view →</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="dim">No sessions yet.</p>
  {% endif %}
</section>
{% endblock %}
